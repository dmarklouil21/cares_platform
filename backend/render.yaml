services:
  - type: web
    name: backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cares_platform_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: WEB_CONCURRENCY
        value: 4

  - type: web
    name: frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/build
    envVars:
      - key: VITE_API_URL 
        value: https://backend.onrender.com  # Your actual backend URL

databases:
  - name: cares_platform_db
    plan: free
    databaseName: cares_platform
    user: myapp_user